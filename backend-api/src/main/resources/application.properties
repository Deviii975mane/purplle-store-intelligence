# ===============================
# APP CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update

# ===============================
# POSTGRESQL DATABASE CONNECTION
# ===============================
# We use environment variables so Docker can inject the network path, 
# but provide 'localhost' fallbacks so you can test it without Docker!
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apex_retail}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:purplle_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:purplle_secure_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
# We set this to 'validate' because our init.sql file handles creating the tables!
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# REDIS QUEUE CONNECTION
# ===============================
spring.data.redis.host=redis
spring.data.redis.port=6379